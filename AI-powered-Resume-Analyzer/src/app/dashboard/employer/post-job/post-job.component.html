<div class="p-8 bg-gray-100 min-h-screen">

  <div class="max-w-5xl mx-auto bg-white p-8 rounded-2xl shadow-sm">

    <h2 class="text-2xl font-semibold mb-6">Create New Job Posting</h2>

    <form [formGroup]="jobForm" (ngSubmit)="submitJob()" class="space-y-6">

      <!-- Row 1 -->
      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium mb-1">Job Title</label>
          <input type="text" formControlName="title"
            class="w-full border rounded-lg px-4 py-2">

          <p *ngIf="jobForm.get('title')?.touched && jobForm.get('title')?.invalid"
             class="text-red-500 text-xs mt-1">
            Job title is required
          </p>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Department</label>
          <input type="text" formControlName="department"
            class="w-full border rounded-lg px-4 py-2">
        </div>
      </div>

      <!-- Row 2 -->
      <div class="grid md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium mb-1">Location</label>
          <input type="text" formControlName="location"
            class="w-full border rounded-lg px-4 py-2">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Employment Type</label>
          <select formControlName="type"
            class="w-full border rounded-lg px-4 py-2">
            <option value="">Select</option>
            <option *ngFor="let type of employmentTypes">
              {{ type }}
            </option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Experience Required</label>
          <input type="text" formControlName="experience"
            class="w-full border rounded-lg px-4 py-2">
        </div>
      </div>

      <!-- Salary -->
      <div>
        <label class="block text-sm font-medium mb-1">Salary Range</label>
        <input type="text" formControlName="salary"
          class="w-full border rounded-lg px-4 py-2">
      </div>

      <!-- Skills -->
      <div>
        <label class="block text-sm font-medium mb-1">Required Skills</label>

        <div class="flex gap-2">
          <input #skillInput type="text"
            class="flex-1 border rounded-lg px-4 py-2"
            placeholder="Add skill and press Enter"
            (keyup.enter)="addSkill(skillInput)">

          <button type="button"
            class="px-4 bg-indigo-600 text-white rounded-lg"
            (click)="addSkill(skillInput)">
            Add
          </button>
        </div>

        <!-- Skill Tags -->
        <div class="flex flex-wrap gap-2 mt-3">
          <span *ngFor="let skill of skills.controls; let i = index"
                class="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full text-sm flex items-center gap-2">
            {{ skill.value }}
            <button type="button" (click)="removeSkill(i)">✕</button>
          </span>
        </div>
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium mb-1">Job Description</label>
        <textarea rows="5" formControlName="description"
          class="w-full border rounded-lg px-4 py-2"></textarea>

        <p *ngIf="jobForm.get('description')?.touched && jobForm.get('description')?.invalid"
           class="text-red-500 text-xs mt-1">
           Description must be at least 20 characters
        </p>
      </div>

      <!-- Actions -->
      <div class="flex justify-end gap-4">

        <button type="button"
          class="px-6 py-2 border rounded-lg hover:bg-gray-50"
          (click)="jobForm.reset(); skills.clear();">
          Cancel
        </button>

        <button type="submit"
          [disabled]="isSubmitting"
          class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">

          <span *ngIf="!isSubmitting">Publish Job</span>
          <span *ngIf="isSubmitting">Publishing...</span>

        </button>

      </div>

    </form>

  </div>
</div>
