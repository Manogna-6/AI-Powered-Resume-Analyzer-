<div class="space-y-8">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-semibold text-gray-900">
        Job Matches ({{ filteredJobs.length }})
      </h1>
      <p class="text-gray-500 mt-1">
        Personalized opportunities based on your resume score
      </p>
    </div>
  </div>

  <!-- Search + Filter -->
  <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-4 md:items-center md:justify-between">

    <input
      type="text"
      placeholder="Search job title or company..."
      [(ngModel)]="searchTerm"
      (input)="onSearchChange()"
      class="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
    />

    <div class="flex gap-3">
      <select
        [(ngModel)]="selectedLocation"
        (change)="onFilterChange()"
        class="px-4 py-2.5 border border-gray-200 rounded-xl">

        <option>All Locations</option>
        <option>Remote</option>
        <option>Hybrid</option>
        <option>Onsite</option>
      </select>

      <select
        [(ngModel)]="selectedType"
        (change)="onFilterChange()"
        class="px-4 py-2.5 border border-gray-200 rounded-xl">

        <option>All Types</option>
        <option>Full-time</option>
        <option>Part-time</option>
      </select>
    </div>
  </div>

  <!-- Job Cards -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <div *ngFor="let job of filteredJobs"
         class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">

      <div class="flex items-start justify-between">
        <div>
          <h2 class="text-xl font-semibold text-gray-900">
            {{ job.title }}
          </h2>
          <p class="text-gray-500 text-sm mt-1">
            {{ job.company }} • {{ job.location }}
          </p>
        </div>

        <span class="text-sm px-3 py-1 rounded-full font-medium"
              [ngClass]="{
                'bg-emerald-100 text-emerald-600': job.match >= 90,
                'bg-indigo-100 text-indigo-600': job.match >= 75 && job.match < 90,
                'bg-amber-100 text-amber-600': job.match < 75
              }">
          {{ job.match }}% Match
        </span>
      </div>

      <p class="text-gray-600 text-sm mt-4 leading-relaxed">
        {{ job.description }}
      </p>

      <div class="flex items-center justify-between mt-6">
        <div class="text-sm text-gray-500">
          💰 {{ job.salary }}
        </div>

        <button class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition shadow-sm">
          Apply Now
        </button>
      </div>

    </div>

  </div>

  <!-- Empty State -->
  <div *ngIf="filteredJobs.length === 0"
       class="text-center text-gray-500 py-10">
    No jobs found.
  </div>

</div>
