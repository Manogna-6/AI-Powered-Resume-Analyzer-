<div class="min-h-screen flex bg-slate-950 text-white">

  <!-- LEFT SIDE -->
  <div class="w-full md:w-1/2 flex items-center justify-center px-8 py-12 bg-white text-gray-900">

    <div class="w-full max-w-md">

      <!-- Back to Home -->
      <a routerLink="/" 
         class="flex items-center gap-2 text-sm text-gray-500 hover:text-indigo-600 transition mb-8">
        <span class="text-lg">←</span>
        <span>Back to Home</span>
      </a>

      <!-- Logo Section -->
      <div class="flex flex-col items-center mb-10">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center text-white text-2xl font-bold shadow-lg">
          N
        </div>
        <h2 class="text-2xl font-bold mt-3 tracking-wide">Nexthire</h2>
      </div>

      <!-- Heading -->
      <h1 class="text-3xl font-bold mb-2 text-center">
        Welcome Back
      </h1>
      <p class="text-gray-500 mb-8 text-center">
        AI-Powered Smart Hiring Platform
      </p>

      <!-- FORM -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium mb-2">Email Address</label>
          <input type="email"
            formControlName="email"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium mb-2">Password</label>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
            <span (click)="togglePassword()"
              class="absolute right-4 top-3 text-gray-400 cursor-pointer hover:text-indigo-600">
              👁
            </span>
          </div>
        </div>

        <!-- Role -->
<div>
  <label class="block text-sm font-medium mb-2">Select Role</label>
  <select formControlName="role"
    class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
    <option value="">Select Role</option>
    <option value="job-seeker">Job Seeker</option>
    <option value="employer">Employer</option>
  </select>
</div>

        <!-- Forgot Password -->
        <div class="text-right">
          <a href="#" class="text-sm text-indigo-600 hover:underline">
            Forgot password?
          </a>
        </div>

        <!-- Button -->
        <button type="submit"
          class="w-full py-3 rounded-2xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold shadow-xl hover:scale-[1.03] hover:shadow-2xl transition duration-300">
          Sign In
        </button>

      </form>

      <!-- Register -->
      <p class="text-center text-gray-500 mt-8">
        Don’t have an account?
        <a routerLink="/auth/register" 
           class="text-indigo-600 font-semibold hover:underline">
          Create Account
        </a>
      </p>

    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="hidden md:flex w-1/2 items-center justify-center bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 relative overflow-hidden">

    <!-- Glow Effect -->
    <div class="absolute w-96 h-96 bg-white/10 rounded-full blur-3xl top-20 left-20"></div>
    <div class="absolute w-72 h-72 bg-pink-400/20 rounded-full blur-3xl bottom-10 right-10"></div>

    <div class="text-center max-w-lg relative z-10 px-10">
      <h2 class="text-4xl font-bold mb-6">
        Smart Hiring Starts Here
      </h2>
      <p class="text-lg text-indigo-100 leading-relaxed">
        AI-powered resume analysis, intelligent job matching,
        and emotion-aware video interviews — all in one platform.
      </p>
    </div>

  </div>

</div>
