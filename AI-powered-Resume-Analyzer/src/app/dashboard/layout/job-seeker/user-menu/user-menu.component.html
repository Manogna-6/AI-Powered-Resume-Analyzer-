<div class="relative" (click)="toggleMenu()">

  <div class="flex items-center space-x-2 cursor-pointer">
    <img src="https://i.pravatar.cc/40"
         class="w-9 h-9 rounded-full border" />
    <span class="text-sm font-medium">John</span>
  </div>

  <div *ngIf="isOpen"
       class="absolute right-0 mt-3 w-48 bg-white shadow-lg rounded-lg p-3">

    <a routerLink="settings"
       class="block px-3 py-2 hover:bg-gray-100 rounded">
      Profile
    </a>

    <button class="block w-full text-left px-3 py-2 hover:bg-gray-100 rounded">
      Logout
    </button>

  </div>

</div>
